<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Quản lý người dùng | Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link th:href="@{/css/admin.css}" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>
    <div th:replace="~{fragment/frag :: sidebar(${mode}, ${(isPendingPage ?: false) ? 'users-pending' : 'users'})}"></div>

    <div class="main-content">
        <div class="page-header">
            <div class="page-title">
                <h1 th:text="${isPendingPage ? 'Yêu cầu Phê duyệt' : 'Quản lý Tài khoản'}"></h1>
                <p th:text="${isPendingPage ? 'Danh sách nhân viên mới đăng ký đang đợi duyệt.' : 'Cấp độ Admin: Quản trị người dùng và truy cập hệ thống.'}"></p>
            </div>
            <div class="header-actions">
                <a th:if="${!isPendingPage}" th:href="@{/admin/users/pending}" class="btn" style="background: #f1f5f9; color: #1e293b; margin-right: 10px;">
                    <i class="bi bi-person-plus"></i> Đợi duyệt
                </a>
                <a th:href="@{/admin/users/add}" class="btn btn-primary" sec:authorize="hasRole('ADMIN')">Thêm tài khoản</a>
            </div>
        </div>

        <div th:if="${successMessage}" class="alert alert-success" style="margin-bottom: 20px; padding: 12px 20px; background: #ecfdf5; color: #059669; border-radius: 8px; border: 1px solid #10b981;">
            <i class="bi bi-check-circle"></i> <span th:text="${successMessage}"></span>
        </div>
        <div th:if="${warningMessage}" class="alert alert-warning" style="margin-bottom: 20px; padding: 12px 20px; background: #fffbeb; color: #d97706; border-radius: 8px; border: 1px solid #f59e0b;">
            <i class="bi bi-exclamation-triangle"></i> <span th:text="${warningMessage}"></span>
        </div>
        <div th:if="${errorMessage}" class="alert alert-error" style="margin-bottom: 20px; padding: 12px 20px; background: #fef2f2; color: #dc2626; border-radius: 8px; border: 1px solid #ef4444;">
            <i class="bi bi-x-circle"></i> <span th:text="${errorMessage}"></span>
        </div>

        <div class="content-card">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Họ và tên</th>
                        <th>Tên đăng nhập</th>
                        <th>Chức vụ</th>
                        <th>Trạng thái</th>
                        <th>Thao tác</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="u : ${users}">
                        <td th:text="${u.fullName}"></td>
                        <td th:text="${u.username}"></td>
                        <td><span class="badge badge-role" th:text="${u.role.name}"></span></td>
                        <td>
                            <span th:if="${u.status.name() == 'ACTIVE'}" class="badge badge-success">Đang hoạt động</span>
                            <span th:if="${u.status.name() == 'PENDING'}" class="badge" style="background:#fef3c7; color:#92400e;">Chờ duyệt</span>
                            <span th:if="${u.status.name() == 'LOCKED'}" class="badge" style="background:#f1f5f9; color:#64748b;">Bị khóa</span>
                        </td>
                        <td class="actions">
                            <th:block th:if="${isPendingPage}">
                                <a th:href="@{/admin/users/approve/{id}(id=${u.id})}" class="btn btn-primary" style="padding: 5px 12px; font-size: 0.8rem;">
                                    <i class="bi bi-check-lg"></i> Duyệt
                                </a>
                                <a href="javascript:void(0)" th:onclick="'confirmReject(' + ${u.id} + ')'" 
                                   class="btn" style="padding: 5px 12px; font-size: 0.8rem; background: #f43f5e; color: white; margin-left: 5px;">
                                    <i class="bi bi-x-circle"></i> Từ chối
                                </a>
                            </th:block>
                            <th:block th:if="${!isPendingPage}">
                                <a th:href="@{/admin/users/edit/{id}(id=${u.id})}" class="btn-action btn-edit"
                                    title="Chỉnh sửa"><i class="bi bi-pencil"></i></a>
                                <a href="javascript:void(0)" th:onclick="'confirmDelete(' + ${u.id} + ')'"
                                    class="btn-action btn-delete" title="Xóa tài khoản"><i class="bi bi-trash"></i></a>
                            </th:block>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        function confirmDelete(id) {
            Swal.fire({
                title: 'Xóa tài khoản?',
                text: "Toàn bộ dữ liệu của người dùng này sẽ không thể khôi phục!",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#f43f5e',
                confirmButtonText: 'Đồng ý xóa'
            }).then((result) => {
                if (result.isConfirmed) {
                    window.location.href = '/admin/users/delete/' + id;
                }
            })
        }

        function confirmReject(id) {
            Swal.fire({
                title: 'Từ chối tài khoản?',
                text: "Yêu cầu đăng ký này sẽ bị xóa bỏ hoàn toàn.",
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: '#f43f5e',
                confirmButtonText: 'Từ chối'
            }).then((result) => {
                if (result.isConfirmed) {
                    window.location.href = '/admin/users/reject/' + id;
                }
            })
        }
    </script>
</body>

</html>
