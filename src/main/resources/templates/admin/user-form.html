<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Cập nhật tài khoản | Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link th:href="@{/css/admin.css}" rel="stylesheet">
</head>

<body>
    <div class="sidebar">
        <a th:href="@{/}" style="text-decoration: none; color: inherit;">
            <div class="logo">Gia Đình</div>
        </a>
        <ul class="nav-menu">
            <li class="nav-item">
                <a th:href="@{/admin/users}" class="nav-link active">Quản lý Tài khoản</a>
            </li>
            <li class="nav-item"><a href="#" class="nav-link">Quản lý Thực đơn</a></li>
            <li class="nav-item"><a href="#" class="nav-link">Quản lý Bàn</a></li>
        </ul>
    </div>

    <div class="main-content">
        <div class="page-header">
            <div class="page-title">
                <h1 th:text="${title}">Thêm tài khoản</h1>
                <p>Vui lòng điền đầy đủ thông tin bên dưới.</p>
            </div>
            <a th:href="@{/admin/users}" class="btn" style="background:#e2e8f0; color:var(--dark);">Quay lại</a>
        </div>

        <div class="content-card" style="max-width: 600px;">
            <form th:action="@{/admin/users/save}" th:object="${user}" method="post">
                <input type="hidden" th:field="*{id}">

                <div class="form-group">
                    <label>Họ và tên</label>
                    <input type="text" th:field="*{fullName}" placeholder="Nhập họ tên..." required>
                </div>

                <div class="form-group">
                    <label>Tên đăng nhập</label>
                    <input type="text" th:field="*{username}" placeholder="Nhập username..." required
                        th:readonly="${user.id != null}">
                </div>

                <div class="form-group">
                    <label>Mật khẩu</label>
                    <input type="password" th:field="*{password}" placeholder="Nhập mật khẩu..."
                        th:required="${user.id == null}">
                    <small th:if="${user.id != null}" style="color:var(--text-muted);">* Để trống nếu không muốn đổi mật
                        khẩu</small>
                </div>

                <div class="form-group">
                    <label>Quyền hạn</label>
                    <select th:field="*{role.id}" required>
                        <option th:each="r : ${roles}" th:value="${r.id}" th:text="${r.name}"></option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Trạng thái</label>
                    <select th:field="*{status}">
                        <option value="ACTIVE">Đang hoạt động</option>
                        <option value="LOCKED">Khóa tài khoản</option>
                        <option value="PENDING" th:if="${user.status != null && user.status.name() == 'PENDING'}">Đang chờ duyệt</option>
                    </select>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Lưu thông tin</button>
                    <button type="reset" class="btn" style="background:#f1f5f9;">Làm mới</button>
                </div>
            </form>
        </div>
    </div>
</body>

</html>
