<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập | Gia Đình Quán</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link th:href="@{/css/login.css}" rel="stylesheet">
</head>
<body>
    <div class="circle circle-1"></div>
    <div class="circle circle-2"></div>

    <div class="login-container">
        <div class="header">
            <a th:href="@{/}" style="text-decoration: none; color: inherit;">
                <h1>Gia Đình</h1>
            </a>
            <p>Restaurant Management System</p>
        </div>

        <!-- Hiển thị lỗi nếu đăng nhập thất bại -->
        <div th:if="${param.error}" class="error-message">
            <svg xmlns="http://www.w3.org/2001/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
            <span>Tên đăng nhập hoặc mật khẩu không đúng!</span>
        </div>

        <!-- Hiển thị thông báo thành công từ đăng ký -->
        <div th:if="${message}" style="background: #ecfdf5; color: #059669; padding: 12px; border-radius: 8px; margin-bottom: 20px; font-size: 0.85rem; border: 1px solid #10b981;">
            <span th:text="${message}"></span>
        </div>

        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label for="username">Tên đăng nhập</label>
                <input type="text" id="username" name="username" placeholder="Nhập tài khoản..." required autofocus>
            </div>

            <div class="form-group">
                <label for="password">Mật khẩu</label>
                <input type="password" id="password" name="password" placeholder="Nhập mật khẩu..." required>
            </div>

            <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 20px; color: rgba(255,255,255,0.8); font-size: 0.9rem;">
                <input type="checkbox" id="remember-me" name="remember-me" style="width: 16px; height: 16px; cursor: pointer;">
                <label for="remember-me" style="cursor: pointer; margin: 0;">Ghi nhớ đăng nhập</label>
            </div>

            <button type="submit" class="btn-login">Đăng nhập</button>
            <div style="text-align: center; margin-top: 15px; font-size: 0.9rem;">
                Chưa có tài khoản? <a th:href="@{/register}" style="color: var(--primary); font-weight: 600; text-decoration: none;">Đăng ký nhân viên</a>
            </div>
        </form>

        <div class="footer">
            &copy; 2024 Gia Đình Quán. Tất cả quyền lợi được bảo lưu.
        </div>
    </div>
</body>
</html>
