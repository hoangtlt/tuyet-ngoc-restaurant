<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Hồ sơ cá nhân</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link th:href="@{/css/admin.css}" rel="stylesheet">
    <link th:href="@{/css/mobile.css}" rel="stylesheet">
    <style>
        .profile-container {
            max-width: 800px;
            margin: 0 auto;
        }

        .profile-header {
            background: white;
            padding: 40px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 30px;
            margin-bottom: 30px;
            border: 1px solid #f1f5f9;
            box-shadow: 0 4px 15px -1px rgba(0, 0, 0, 0.05);
        }

        .avatar-circle {
            width: 100px;
            height: 100px;
            background: var(--primary);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: 800;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            flex-shrink: 0;
        }

        .user-meta h2 {
            font-size: 1.8rem;
            font-weight: 800;
            color: #1e293b;
            margin-bottom: 5px;
        }

        .user-meta .role-badge {
            display: inline-block;
            padding: 4px 12px;
            background: #eff6ff;
            color: #2563eb;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .form-section {
            background: white;
            padding: 40px;
            border-radius: 20px;
            border: 1px solid #f1f5f9;
            box-shadow: 0 4px 15px -1px rgba(0, 0, 0, 0.05);
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            color: #64748b;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        .form-control {
            width: 100%;
            padding: 12px 16px;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
            font-family: inherit;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.1);
        }

        .form-control:disabled {
            background: #f8fafc;
            color: #94a3b8;
            cursor: not-allowed;
        }

        .btn-update {
            background: var(--primary);
            color: white;
            padding: 14px 24px;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            font-size: 1rem;
            transition: all 0.2s;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-update:hover {
            filter: brightness(1.1);
            transform: translateY(-2px);
        }

        .btn-update:active {
            transform: scale(0.98);
        }

        .help-text {
            font-size: 0.8rem;
            color: #94a3b8;
            margin-top: 5px;
        }

        .alert {
            padding: 15px 20px;
            border-radius: 12px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
        }

        .alert-success {
            background: #ecfdf5;
            color: #059669;
            border: 1px solid #d1fae5;
        }

        .alert-error {
            background: #fef2f2;
            color: #dc2626;
            border: 1px solid #fee2e2;
        }

        @media (max-width: 768px) {
            .profile-header {
                flex-direction: column;
                text-align: center;
                padding: 30px 20px;
            }

            .form-section {
                padding: 30px 20px;
            }

            .form-grid-mobile {
                grid-template-columns: 1fr !important;
                gap: 0 !important;
            }
        }
    </style>
</head>

<body>
    <div th:replace="~{fragment/frag :: sidebar(${mode}, 'profile')}"></div>

    <!-- Mobile Top Bar -->
    <div class="mobile-topbar mobile-only">
        <button class="menu-toggle" onclick="toggleSidebar()" aria-label="Mở menu">
            <i class="bi bi-list"></i>
        </button>
        <span class="brand">👤 Hồ sơ</span>
    </div>

    <div class="main-content">
        <div class="profile-container">
            <div th:if="${success}" class="alert alert-success">
                <i class="bi bi-check-circle-fill"></i>
                <span th:text="${success}"></span>
            </div>
            <div th:if="${error}" class="alert alert-error">
                <i class="bi bi-exclamation-triangle-fill"></i>
                <span th:text="${error}"></span>
            </div>

            <div class="profile-header">
                <div class="avatar-circle" th:text="${#strings.substring(user.fullName, 0, 1)}">U</div>
                <div class="user-meta">
                    <h2 th:text="${user.fullName}">Tên người dùng</h2>
                    <span class="role-badge">
                        <i class="bi bi-shield-lock"></i>
                        <span
                            th:text="${user.role.name == 'ADMIN' ? 'Quản trị viên' : (user.role.name == 'MANAGER' ? 'Quản lý' : 'Nhân viên')}">Role</span>
                    </span>
                    <p style="margin-top: 10px; color: #64748b; font-size: 0.9rem;">
                        <i class="bi bi-person"></i> Username: <strong th:text="${user.username}">admin</strong>
                    </p>
                </div>
            </div>

            <div class="form-section">
                <form th:action="@{/profile/update}" method="post">
                    <div class="form-group">
                        <label>Tên đăng nhập (Không thể thay đổi)</label>
                        <input type="text" class="form-control" th:value="${user.username}" disabled>
                    </div>

                    <div class="form-group">
                        <label>Họ và tên</label>
                        <input type="text" name="fullName" class="form-control" th:value="${user.fullName}" required
                            placeholder="Nhập họ và tên...">
                    </div>

                    <div class="form-grid-mobile" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                        <div class="form-group">
                            <label>Số điện thoại</label>
                            <input type="text" name="phone" class="form-control" th:value="${user.phone}"
                                placeholder="Nhập số điện thoại...">
                        </div>
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" name="email" class="form-control" th:value="${user.email}"
                                placeholder="Nhập email...">
                        </div>
                    </div>

                    <div style="border-top: 1px solid #f1f5f9; padding-top: 25px; margin-top: 10px;">
                        <div class="form-group" style="margin-bottom: 5px;">
                            <label>Mật khẩu mới</label>
                            <input type="password" name="newPassword" class="form-control"
                                placeholder="Để trống nếu không muốn đổi mật khẩu">
                        </div>
                        <p class="help-text"><i class="bi bi-info-circle"></i> Chỉ điền nếu bạn muốn thay đổi mật khẩu
                            hiện tại.</p>
                    </div>

                    <button type="submit" class="btn-update">
                        <i class="bi bi-save"></i> Lưu thay đổi
                    </button>
                </form>
            </div>
        </div>
    </div>
</body>

</html>
