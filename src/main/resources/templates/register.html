<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký tài khoản | Gia Đình Quán</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link th:href="@{/css/login.css}" rel="stylesheet">
</head>
<body>
    <div class="circle circle-1"></div>
    <div class="circle circle-2"></div>

    <div class="login-container">
        <div class="header">
            <a th:href="@{/}" style="text-decoration: none; color: inherit;">
                <h1>Gia Đình</h1>
            </a>
            <p>Đăng ký tài khoản nhân viên</p>
        </div>

        <div th:if="${error}" class="error-message" style="background: #fee2e2; color: #dc2626; padding: 10px; border-radius: 8px; margin-bottom: 15px; font-size: 0.85rem; display: flex; align-items: center; gap: 8px;">
            <span>[[${error}]]</span>
        </div>

        <form th:action="@{/register}" th:object="${user}" method="post">
            <div class="form-group">
                <label for="username">Tên đăng nhập</label>
                <input type="text" id="username" th:field="*{username}" 
                       placeholder="Ví dụ: nhanvien1 (không dấu cách)" 
                       pattern="^[a-zA-Z0-9._-]+$" title="Tên đăng nhập không được chứa khoảng trắng hoặc ký tự có dấu" required autofocus>
            </div>

            <div class="form-group">
                <label for="fullName">Họ và tên</label>
                <input type="text" id="fullName" th:field="*{fullName}" placeholder="Nhập tên đầy đủ..." required>
            </div>

            <div class="form-group">
                <label for="phone">Số điện thoại</label>
                <input type="tel" id="phone" th:field="*{phone}" 
                       placeholder="Ví dụ: 0912345678" 
                       pattern="^(0|84)[0-9]{9}$" title="Số điện thoại phải có 10 chữ số">
            </div>

            <div class="form-group">
                <label for="password">Mật khẩu</label>
                <input type="password" id="password" th:field="*{password}" placeholder="Nhập mật khẩu..." required>
            </div>

            <button type="submit" class="btn-login" style="margin-top: 10px;">Đăng ký ngay</button>
            
            <div style="text-align: center; margin-top: 20px; font-size: 0.9rem;">
                Bạn đã có tài khoản? <a th:href="@{/login}" style="color: var(--primary); font-weight: 600; text-decoration: none;">Đăng nhập</a>
            </div>
        </form>

        <div class="footer">
            &copy; 2024 Gia Đình Quán. Hệ thống đăng ký tự động.
        </div>
    </div>
</body>
</html>
