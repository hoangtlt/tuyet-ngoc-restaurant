<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cập nhật khu vực | Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link th:href="@{/css/admin.css}" rel="stylesheet">
</head>
<body>
    <div th:replace="~{fragment/frag :: sidebar(${mode}, 'areas')}"></div>

    <div class="main-content">
        <div class="page-header">
            <div class="page-title">
                <h1 th:text="${title}">Quản lý Khu vực</h1>
                <p>Nhập tên khu vực mới cho nhà hàng.</p>
            </div>
            <a th:href="@{/management/areas}" class="btn" style="background:#e2e8f0; color:var(--dark);">Quay lại</a>
        </div>

        <div class="content-card" style="max-width: 600px;">
            <form th:action="@{/management/areas/save}" th:object="${area}" method="post">
                <input type="hidden" th:field="*{id}">
                
                <div class="form-group">
                    <label>Tên khu vực</label>
                    <input type="text" th:field="*{name}" placeholder="VD: Tầng 1, Sân vườn, VIP..." required>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Lưu thông tin</button>
                    <button type="reset" class="btn" style="background:#f1f5f9;">Làm mới</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
