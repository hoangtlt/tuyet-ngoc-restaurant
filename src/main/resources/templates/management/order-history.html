<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title>Lịch sử Đơn hàng | Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link th:href="@{/css/admin.css}" rel="stylesheet">
    <meta name="_csrf" th:content="${_csrf.token}" />
    <meta name="_csrf_header" th:content="${_csrf.headerName}" />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        .status-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .status-paid {
            background: #dcfce7;
            color: #166534;
        }

        .status-pending {
            background: #fef3c7;
            color: #92400e;
        }

        .status-cancelled {
            background: #fee2e2;
            color: #991b1b;
        }
    </style>
</head>

<body>
    <div th:replace="~{fragment/frag :: sidebar(${mode}, 'orders')}"></div>

    <div class="main-content">
        <div class="page-header">
            <div class="page-title">
                <h1>Lịch sử Đơn hàng</h1>
                <p>Xem toàn bộ danh sách đơn hàng đã thực hiện trong hệ thống.</p>
            </div>
        </div>

        <!-- Bộ lọc thời gian -->
        <div style="margin-bottom: 25px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap;">
            <a th:href="@{/management/orders(period='DAY')}" class="btn"
                th:style="${period == 'DAY' ? 'background: var(--primary); color: white;' : 'background: white; border: 1px solid #e2e8f0;'}">
                <i class="bi bi-calendar-day"></i> Ngày</a>
            <a th:href="@{/management/orders(period='WEEK')}" class="btn"
                th:style="${period == 'WEEK' ? 'background: var(--primary); color: white;' : 'background: white; border: 1px solid #e2e8f0;'}">
                <i class="bi bi-calendar-event"></i> 1 Tuần</a>
            <a th:href="@{/management/orders(period='MONTH')}" class="btn"
                th:style="${period == 'MONTH' ? 'background: var(--primary); color: white;' : 'background: white; border: 1px solid #e2e8f0;'}">
                <i class="bi bi-calendar-month"></i> 1 Tháng</a>
            <a th:href="@{/management/orders(period='YEAR')}" class="btn"
                th:style="${period == 'YEAR' ? 'background: var(--primary); color: white;' : 'background: white; border: 1px solid #e2e8f0;'}">
                <i class="bi bi-calendar-range"></i> 1 Năm</a>
            <a th:href="@{/management/orders(period='ALL')}" class="btn"
                th:style="${period == 'ALL' ? 'background: var(--primary); color: white;' : 'background: white; border: 1px solid #e2e8f0;'}">
                <i class="bi bi-infinity"></i> Tất cả</a>
                
            <div th:if="${period == 'DAY'}" style="margin-left: auto; display: flex; align-items: center; gap: 5px;">
                <span style="font-size: 0.9rem; font-weight: 600; color: #64748b;">Chọn ngày:</span>
                <input type="date" id="dateSelect" class="form-control" style="padding: 6px 12px; border-radius: 8px; border: 1px solid #cbd5e1; outline: none;" onchange="updateFilter()" th:value="${selectedDate}">
            </div>
        </div>

        <div class="content-card">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Bàn</th>
                        <th>Thời gian</th>
                        <th>Trạng thái</th>
                        <th>Tổng tiền</th>
                        <th>Thao tác</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="o : ${orders}">
                        <td data-label="ID">#<span th:text="${o.id}"></span></td>
                        <td data-label="Bàn">
                            <span th:if="${o.table != null}" th:text="${o.table.tableNumber}"
                                style="font-weight: 700;"></span>
                            <span th:if="${o.table == null}" style="font-style: italic; color: #94a3b8;">N/A</span>
                        </td>
                        <td data-label="Thời gian">
                            <div style="font-weight: 600;"
                                th:text="${#temporals.format(o.createdAt, 'HH:mm dd/MM/yy')}"></div>
                        </td>
                        <td data-label="Trạng thái">
                            <span class="status-badge"
                                th:classappend="${o.status.name() == 'PAID' ? 'status-paid' : (o.status.name() == 'PENDING' ? 'status-pending' : 'status-cancelled')}"
                                th:text="${o.status.name() == 'PAID' ? 'Đã xong' : (o.status.name() == 'PENDING' ? 'Chờ' : 'Hủy')}">
                            </span>
                        </td>
                        <td data-label="Tổng tiền" style="font-weight: 800; color: var(--primary);"
                            th:text="${#numbers.formatDecimal(o.totalAmount, 0, 'COMMA', 0, 'POINT') + ' đ'}"></td>
                        <td data-label="Thao tác" class="actions">
                            <button type="button" class="btn-action btn-edit"
                                th:onclick="'showOrderDetail(' + ${o.id} + ')'" title="Xem chi tiết">
                                <i class="bi bi-eye"></i>
                            </button>
                            <button type="button" class="btn-action" th:onclick="'reprintOrder(' + ${o.id} + ')'"
                                style="color: #10b981; background: #f0fdf4; border: 1px solid #dcfce7;"
                                title="In lại hóa đơn">
                                <i class="bi bi-printer"></i>
                            </button>
                            <a sec:authorize="hasRole('ADMIN')" href="javascript:void(0)"
                                th:onclick="'confirmDeleteOrder(' + ${o.id} + ')'" class="btn-action btn-delete"
                                title="Xóa">
                                <i class="bi bi-trash"></i>
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>

            <!-- Phân trang -->
            <div th:if="${totalPages > 0}"
                style="margin-top: 30px; display: flex; justify-content: space-between; align-items: center; padding-top: 20px; border-top: 1px solid #f1f5f9;">
                <div style="color: #64748b; font-size: 0.9rem;">
                    Trang <span th:text="${currentPage + 1}" style="font-weight: 700; color: #1e293b;"></span> / <span
                        th:text="${totalPages}"></span>
                </div>
                <div style="display: flex; gap: 8px;">
                    <a th:if="${currentPage > 0}"
                        th:href="@{/management/orders(page=${currentPage - 1}, period=${period})}" class="btn"
                        style="background: white; border: 1px solid #e2e8f0; padding: 8px 15px; border-radius: 8px; font-size: 0.9rem;">
                        <i class="bi bi-chevron-left"></i> Trang trước
                    </a>
                    <a th:if="${currentPage < totalPages - 1}"
                        th:href="@{/management/orders(page=${currentPage + 1}, period=${period})}" class="btn"
                        style="background: white; border: 1px solid #e2e8f0; padding: 8px 15px; border-radius: 8px; font-size: 0.9rem;">
                        Trang sau <i class="bi bi-chevron-right"></i>
                    </a>
                </div>
            </div>
        </div>
    </div>
    <!-- Form ẩn cho các hành động DELETE/POST -->
    <form id="genericActionForm" method="post" style="display: none;">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
    </form>
    </div>

    <script>
        function updateFilter() {
            const dateSelect = document.getElementById('dateSelect');
            if (dateSelect && dateSelect.value) {
                window.location.href = '/management/orders?period=DAY&date=' + dateSelect.value;
            }
        }

        function reprintOrder(id) {
            Swal.fire({
                title: 'Đang gửi lệnh in...',
                allowOutsideClick: false,
                didOpen: () => {
                    Swal.showLoading();
                }
            });

            const csrfToken = document.querySelector('meta[name="_csrf"]').getAttribute('content');
            const csrfHeader = document.querySelector('meta[name="_csrf_header"]').getAttribute('content');

            fetch('/management/orders/reprint/' + id, {
                method: 'POST',
                headers: {
                    [csrfHeader]: csrfToken
                }
            })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        Swal.fire('Thành công', data.message, 'success');
                    } else {
                        Swal.fire('Lỗi', data.message, 'error');
                    }
                })
                .catch(error => {
                    Swal.fire('Lỗi', 'Không thể kết nối tới máy chủ!', 'error');
                });
        }

        function showOrderDetail(id) {
            Swal.fire({
                title: 'Đang tải thông tin...',
                allowOutsideClick: false,
                didOpen: () => {
                    Swal.showLoading();
                }
            });

            fetch('/management/orders/api/detail/' + id)
                .then(response => response.json())
                .then(order => {
                    let itemsHtml = `
                        <div style="text-align: left; font-family: 'Outfit', sans-serif;">
                            <div style="display: flex; justify-content: space-between; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid #e2e8f0;">
                                <div>
                                    <div style="font-size: 0.85rem; color: #64748b;">Mã đơn:</div>
                                    <div style="font-weight: 800; font-size: 1.2rem;">#${order.id}</div>
                                </div>
                                <div style="text-align: right;">
                                    <div style="font-size: 0.85rem; color: #64748b;">Bàn:</div>
                                    <div style="font-weight: 800; font-size: 1.2rem;">${order.tableNumber}</div>
                                </div>
                            </div>

                            <div style="margin-bottom: 20px;">
                                <div style="display: grid; grid-template-columns: 1fr 1.5fr; gap: 15px; margin-bottom: 12px;">
                                    <div>
                                        <div style="font-size: 0.75rem; color: #94a3b8; text-transform: uppercase;">Nhân viên</div>
                                        <div style="font-weight: 600;">${order.staffName}</div>
                                    </div>
                                    <div style="text-align: right;">
                                        <div style="font-size: 0.75rem; color: #94a3b8; text-transform: uppercase;">Thời gian</div>
                                        <div style="font-weight: 600;">${order.createdAt}</div>
                                    </div>
                                </div>
                                <div style="display: grid; grid-template-columns: 1fr; gap: 15px;">
                                    <div>
                                        <div style="font-size: 0.75rem; color: #94a3b8; text-transform: uppercase;">Thanh toán</div>
                                        <div style="font-weight: 600;">${order.paymentMethod === 'CASH' ? 'Tiền mặt' : (order.paymentMethod === 'TRANSFER' ? 'Chuyển khoản' : 'N/A')}</div>
                                    </div>
                                </div>
                            </div>

                            <table style="width: 100%; border-collapse: collapse; font-size: 0.9rem;">
                                <thead>
                                    <tr style="border-bottom: 2px solid #f1f5f9; color: #64748b;">
                                        <th style="text-align: left; padding: 10px 0;">Món ăn</th>
                                        <th style="text-align: center; padding: 10px 0;">SL</th>
                                        <th style="text-align: right; padding: 10px 0;">Thành tiền</th>
                                    </tr>
                                </thead>
                                <tbody>
                    `;

                    order.items.forEach(item => {
                        let itemName = item.productName;
                        if (item.variantName) itemName += ` <small style="color: #3b82f6;">(${item.variantName})</small>`;

                        let imgHtml = item.imageUrl
                            ? `<img src="${item.imageUrl}" style="width: 45px; height: 45px; border-radius: 8px; object-fit: cover; border: 1px solid #e2e8f0;">`
                            : `<div style="width: 45px; height: 45px; border-radius: 8px; background: #f1f5f9; display: flex; align-items: center; justify-content: center; color: #94a3b8;"><i class="bi bi-image" style="font-size: 1.2rem;"></i></div>`;

                        itemsHtml += `
                            <tr style="border-bottom: 1px solid #f8fafc;">
                                <td style="padding: 12px 0;">
                                    <div style="display: flex; align-items: center; gap: 12px;">
                                        ${imgHtml}
                                        <div>
                                            <div style="font-weight: 700; color: #1e293b;">${itemName}</div>
                                            ${item.note ? `<div style="font-size: 0.75rem; font-style: italic; color: #94a3b8; margin-top: 2px;">* ${item.note}</div>` : ''}
                                        </div>
                                    </div>
                                </td>
                                <td style="text-align: center; font-weight: 600;">${item.quantity}</td>
                                <td style="text-align: right; font-weight: 700; color: #1e293b;">${item.subTotal.toLocaleString()} đ</td>
                            </tr>
                        `;
                    });

                    itemsHtml += `
                                </tbody>
                            </table>
                            
                            <div style="margin-top: 20px; padding: 15px; background: #f8fafc; border-radius: 12px;">
                                ${order.discountAmount > 0 || order.taxAmount > 0 ? `
                                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px;">
                                    <div style="font-weight: 600; color: #64748b;">TẠM TÍNH</div>
                                    <div style="font-weight: 700; color: #1e293b;">${order.subTotal.toLocaleString()} đ</div>
                                </div>
                                ` : ''}
                                ${order.discountAmount > 0 ? `
                                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px;">
                                    <div style="font-weight: 600; color: #10b981;">GIẢM GIÁ</div>
                                    <div style="font-weight: 700; color: #10b981;">- ${order.discountAmount.toLocaleString()} đ</div>
                                </div>
                                ` : ''}
                                ${order.taxAmount > 0 ? `
                                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px;">
                                    <div style="font-weight: 600; color: #f43f5e;">VAT</div>
                                    <div style="font-weight: 700; color: #f43f5e;">+ ${order.taxAmount.toLocaleString()} đ</div>
                                </div>
                                ` : ''}
                                <div style="${order.discountAmount > 0 || order.taxAmount > 0 ? 'border-top: 1px solid #cbd5e1; padding-top: 10px; margin-top: 5px;' : ''} display: flex; justify-content: space-between; align-items: center;">
                                    <div style="font-weight: 600; color: #64748b;">TỔNG THANH TOÁN</div>
                                    <div style="font-weight: 800; font-size: 1.4rem; color: #1e293b;">${order.totalAmount.toLocaleString()} đ</div>
                                </div>
                            </div>
                        </div>
                    `;

                    Swal.fire({
                        title: 'CHI TIẾT ĐƠN HÀNG',
                        html: itemsHtml,
                        width: '550px',
                        showCloseButton: true,
                        showConfirmButton: false,
                        focusConfirm: false
                    });
                })
                .catch(error => {
                    Swal.fire('Lỗi', 'Không thể tải chi tiết đơn hàng!', 'error');
                });
        }

        function confirmDeleteOrder(id) {
            Swal.fire({
                title: 'Xóa đơn hàng?',
                text: `Toàn bộ dữ liệu của Đơn #${id} sẽ bị xóa vĩnh viễn và không thể khôi phục!`,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#f43f5e',
                confirmButtonText: 'Đồng ý xóa',
                cancelButtonColor: '#64748b',
                cancelButtonText: 'Hủy'
            }).then((result) => {
                if (result.isConfirmed) {
                    handleAction('/management/orders/delete/' + id);
                }
            })
        }

        function handleAction(url) {
            const form = document.getElementById('genericActionForm');
            form.action = url;
            form.submit();
        }
    </script>
</body>

</html>
