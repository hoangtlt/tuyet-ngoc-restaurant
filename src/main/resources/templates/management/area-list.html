<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Quản lý khu vực | Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link th:href="@{/css/admin.css}" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>
    <div th:replace="~{fragment/frag :: sidebar(${mode}, 'areas')}"></div>

    <div class="main-content">
        <div class="page-header">
            <div class="page-title">
                <h1>Quản lý Khu vực</h1>
                <p>Phân chia nhà hàng thành các khu vực để dễ quản lý bàn ăn.</p>
            </div>
            <a th:href="@{/management/areas/add}" class="btn btn-primary"><i class="bi bi-plus"></i> Thêm khu vực</a>
        </div>

        <div class="content-card" style="max-width: 800px;">
            <table class="data-table">
                <thead>
                    <tr>
                        <th width="20%">ID</th>
                        <th width="60%">Tên khu vực</th>
                        <th width="20%">Thao tác</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="a : ${areas}">
                        <td th:text="${a.id}"></td>
                        <td th:text="${a.name}" style="font-weight: 600;"></td>
                        <td class="actions">
                            <a th:href="@{/management/areas/edit/{id}(id=${a.id})}" class="btn-action btn-edit"><i
                                    class="bi bi-pencil"></i></a>
                            <a href="javascript:void(0)" th:onclick="'confirmDelete(' + ${a.id} + ')'"
                                class="btn-action btn-delete"><i class="bi bi-trash"></i></a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        function confirmDelete(id) {
            Swal.fire({
                title: 'Xóa khu vực?',
                text: "Lưu ý: Bạn chỉ có thể xóa khu vực không chứa bàn ăn nào!",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#f43f5e',
                confirmButtonText: 'Đồng ý'
            }).then((result) => {
                if (result.isConfirmed) {
                    window.location.href = '/management/areas/delete/' + id;
                }
            })
        }
    </script>
</body>

</html>
