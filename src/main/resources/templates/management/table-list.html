<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Bàn | Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link th:href="@{/css/admin.css}" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <div th:replace="~{fragment/frag :: sidebar(${mode}, 'tables')}"></div>

    <div class="main-content">
        <div class="page-header">
            <div class="page-title">
                <h1>Quản lý Bàn ăn</h1>
                <p>Thiết lập danh sách bàn ăn cho nhà hàng.</p>
            </div>
            <a th:href="@{/management/tables/add}" class="btn btn-primary"><i class="bi bi-plus"></i> Thêm bàn mới</a>
        </div>

        <div class="content-card">
            <!-- Bộ lọc theo vùng -->
            <div style="margin-bottom: 20px; display: flex; align-items: center; gap: 15px; background: #f8fafc; padding: 15px; border-radius: 12px; border: 1px solid #e2e8f0;">
                <label style="font-weight: 600; color: #475569;"><i class="bi bi-filter-circle"></i> Lọc theo khu vực:</label>
                <select id="areaFilter" style="padding: 8px 15px; border-radius: 8px; border: 1px solid #cbd5e1; outline: none; min-width: 200px;" onchange="filterByArea()">
                    <option value="0">--- Tất cả khu vực ---</option>
                    <option th:each="a : ${areas}" th:value="${a.id}" th:text="${a.name}" th:selected="${a.id == selectedAreaId}"></option>
                </select>
            </div>

            <table class="data-table">
                <thead>
                    <tr>
                        <th>Tên bàn</th>
                        <th>Khu vực</th>
                        <th>Trạng thái</th>
                        <th>Thao tác</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="t : ${tables}">
                        <td th:text="${t.tableNumber}" style="font-weight: 600;"></td>
                        <td th:text="${t.area.name}"></td>
                        <td>
                            <span th:if="${t.status.name() == 'AVAILABLE'}" class="badge badge-success">Sẵn sàng</span>
                            <span th:if="${t.status.name() == 'OCCUPIED'}" class="badge" style="background:#fee2e2; color:#b91c1c;">Có khách</span>
                            <span th:if="${t.status.name() == 'RESERVED'}" class="badge" style="background:#fef3c7; color:#92400e;">Đặt trước</span>
                        </td>
                        <td class="actions">
                            <a th:href="@{/management/tables/edit/{id}(id=${t.id})}" class="btn-action btn-edit"><i class="bi bi-pencil"></i></a>
                            <a href="javascript:void(0)" th:onclick="'confirmDelete(' + ${t.id} + ')'" class="btn-action btn-delete"><i class="bi bi-trash"></i></a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        function filterByArea() {
            const areaId = document.getElementById('areaFilter').value;
            window.location.href = '/management/tables?areaId=' + areaId;
        }

        function confirmDelete(id) {
            Swal.fire({
                title: 'Xóa bàn?',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#f43f5e',
                confirmButtonText: 'Đồng ý'
            }).then((result) => {
                if (result.isConfirmed) {
                    window.location.href = '/management/tables/delete/' + id;
                }
            })
        }
    </script>
</body>
</html>
